name: Submit PR

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'Target repository (owner/repo)'
        required: true
        type: string
      dependencies:
        description: 'Comma-separated list of dependencies to remove'
        required: true
        type: string

jobs:
  submit-pr:
    name: Submit Cleanup PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Validate inputs
        id: validate
        env:
          INPUT_REPO: ${{ github.event.inputs.repo }}
          INPUT_DEPS: ${{ github.event.inputs.dependencies }}
        run: |
          REPO="$INPUT_REPO"
          DEPS="$INPUT_DEPS"

          if [ -z "$REPO" ] || [ -z "$DEPS" ]; then
            echo "::error::Both repo and dependencies inputs are required"
            exit 1
          fi

          # Strict validation: owner/repo must be alphanumeric with .-_
          if ! echo "$REPO" | grep -qE '^[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+$'; then
            echo "::error::Invalid repo format. Must match: owner/repo (alphanumeric, dots, hyphens, underscores only)"
            exit 1
          fi

          OWNER=$(echo "$REPO" | cut -d'/' -f1)
          NAME=$(echo "$REPO" | cut -d'/' -f2)

          if [ -z "$OWNER" ] || [ -z "$NAME" ]; then
            echo "::error::Invalid repo format. Use: owner/repo"
            exit 1
          fi

          # Validate each dependency name
          IFS=',' read -ra DEP_LIST <<< "$DEPS"
          for dep in "${DEP_LIST[@]}"; do
            dep=$(echo "$dep" | xargs)
            if [ -n "$dep" ] && ! echo "$dep" | grep -qE '^(@[a-zA-Z0-9._-]+/)?[a-zA-Z0-9._-]+$'; then
              echo "::error::Invalid dependency name: $dep"
              exit 1
            fi
          done

          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT

          BRANCH="depsweep/cleanup-$(date +%Y%m%d)"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Checkout depsweep
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build depsweep
        run: |
          npm ci --ignore-scripts
          npm run build

      - name: Fork target repository
        id: fork
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
          REPO_NAME: ${{ steps.validate.outputs.name }}
          REPO_FULL: ${{ steps.validate.outputs.repo }}
        run: |
          # Check if fork already exists
          if gh api "repos/chiefmikey/$REPO_NAME" --silent 2>/dev/null; then
            echo "Fork already exists, syncing..."
            gh repo sync "chiefmikey/$REPO_NAME" 2>/dev/null || true
            echo "fork=chiefmikey/$REPO_NAME" >> $GITHUB_OUTPUT
          else
            gh repo fork "$REPO_FULL" --clone=false
            # Wait for fork to be ready
            for i in $(seq 1 30); do
              if gh api "repos/chiefmikey/$REPO_NAME" --silent 2>/dev/null; then
                break
              fi
              sleep 2
            done
            echo "fork=chiefmikey/$REPO_NAME" >> $GITHUB_OUTPUT
          fi

      - name: Clone fork
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
          FORK_REPO: ${{ steps.fork.outputs.fork }}
          UPSTREAM_REPO: ${{ steps.validate.outputs.repo }}
          BRANCH: ${{ steps.validate.outputs.branch }}
        run: |
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${FORK_REPO}.git" target-repo
          cd target-repo
          # Scrub PAT from remote URL immediately after clone
          git remote set-url origin "https://github.com/${FORK_REPO}.git"
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream
          git checkout -B "$BRANCH" upstream/HEAD

      - name: Configure git
        working-directory: target-repo
        run: |
          git config user.name "chiefmikey"
          git config user.email "wolfemikl@gmail.com"

      - name: Detect package manager
        id: detect-pm
        working-directory: target-repo
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            echo "pm=pnpm" >> $GITHUB_OUTPUT
            echo "install=pnpm install --no-frozen-lockfile --ignore-scripts" >> $GITHUB_OUTPUT
            echo "uninstall=pnpm remove --ignore-scripts" >> $GITHUB_OUTPUT
          elif [ -f "yarn.lock" ]; then
            echo "pm=yarn" >> $GITHUB_OUTPUT
            echo "install=yarn install --ignore-scripts" >> $GITHUB_OUTPUT
            echo "uninstall=yarn remove --ignore-scripts" >> $GITHUB_OUTPUT
          else
            echo "pm=npm" >> $GITHUB_OUTPUT
            echo "install=npm install --ignore-scripts" >> $GITHUB_OUTPUT
            echo "uninstall=npm uninstall --ignore-scripts" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        working-directory: target-repo
        env:
          INSTALL_CMD: ${{ steps.detect-pm.outputs.install }}
        run: $INSTALL_CMD

      - name: Run depsweep scan for PR body
        working-directory: target-repo
        run: |
          npm install --ignore-scripts 2>/dev/null || true
          node ../dist/index.js --json --measure-impact --dry-run --output ../pr-report.json 2>/dev/null || true

      - name: Generate PR body
        id: pr-body
        env:
          INPUT_DEPS: ${{ github.event.inputs.dependencies }}
        run: |
          if [ -f pr-report.json ]; then
            node scripts/generate-pr-body.js pr-report.json > pr-body.md
          else
            cat > pr-body.md << 'FALLBACK'
          ## Remove unused dependencies

          This PR removes unused dependencies detected by [DepSweep](https://github.com/chiefmikey/depsweep).

          ### Removed packages
          FALLBACK
            IFS=',' read -ra DEPS <<< "$INPUT_DEPS"
            for dep in "${DEPS[@]}"; do
              dep=$(echo "$dep" | xargs)
              echo "- \`$dep\`" >> pr-body.md
            done
            cat >> pr-body.md << 'FOOTER'

          ---

          > Generated by [DepSweep](https://github.com/chiefmikey/depsweep) — Reducing software's environmental footprint, one dependency at a time.
          FOOTER
          fi

      - name: Remove unused dependencies
        working-directory: target-repo
        env:
          INPUT_DEPS: ${{ github.event.inputs.dependencies }}
          UNINSTALL_CMD: ${{ steps.detect-pm.outputs.uninstall }}
        run: |
          IFS=',' read -ra DEPS <<< "$INPUT_DEPS"
          for dep in "${DEPS[@]}"; do
            dep=$(echo "$dep" | xargs)  # trim whitespace
            if [ -n "$dep" ]; then
              echo "Removing: $dep"
              $UNINSTALL_CMD "$dep" || echo "Warning: Failed to remove $dep"
            fi
          done

      - name: Commit and push
        working-directory: target-repo
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
          INPUT_DEPS: ${{ github.event.inputs.dependencies }}
          FORK_REPO: ${{ steps.fork.outputs.fork }}
          BRANCH: ${{ steps.validate.outputs.branch }}
        run: |
          git add package.json package-lock.json yarn.lock pnpm-lock.yaml 2>/dev/null; git add -u
          if git diff --cached --quiet; then
            echo "::error::No changes to commit. Dependencies may not have been found."
            exit 1
          fi

          # Count removed deps for commit message
          IFS=',' read -ra DEPS <<< "$INPUT_DEPS"
          COUNT=${#DEPS[@]}

          if [ "$COUNT" -eq 1 ]; then
            NOUN="dependency"
          else
            NOUN="dependencies"
          fi

          git commit -m "chore: remove $COUNT unused $NOUN (depsweep)

          Removed: $INPUT_DEPS

          Detected by DepSweep automated dependency analysis.
          See: https://github.com/chiefmikey/depsweep"

          git push "https://x-access-token:${GH_TOKEN}@github.com/${FORK_REPO}.git" "$BRANCH" --force

      - name: Create pull request
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
          INPUT_DEPS: ${{ github.event.inputs.dependencies }}
          TARGET_REPO: ${{ steps.validate.outputs.repo }}
          BRANCH: ${{ steps.validate.outputs.branch }}
        run: |
          IFS=',' read -ra DEPS <<< "$INPUT_DEPS"
          COUNT=${#DEPS[@]}

          if [ "$COUNT" -eq 1 ]; then
            NOUN="dependency"
          else
            NOUN="dependencies"
          fi

          PR_URL=$(gh pr create \
            --repo "$TARGET_REPO" \
            --head "chiefmikey:$BRANCH" \
            --title "chore: remove $COUNT unused $NOUN (depsweep)" \
            --body-file pr-body.md)

          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "::notice::PR created: $PR_URL"

      - name: Summary
        env:
          TARGET_REPO: ${{ steps.validate.outputs.repo }}
          PR_URL: ${{ steps.create-pr.outputs.pr_url }}
          INPUT_DEPS: ${{ github.event.inputs.dependencies }}
        run: |
          echo "## PR Submitted" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** \`$TARGET_REPO\`" >> $GITHUB_STEP_SUMMARY
          echo "**PR:** $PR_URL" >> $GITHUB_STEP_SUMMARY
          echo "**Dependencies removed:** \`$INPUT_DEPS\`" >> $GITHUB_STEP_SUMMARY
