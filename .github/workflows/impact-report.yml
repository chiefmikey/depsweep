name: Impact Analysis Report

on:
  workflow_dispatch:
    inputs:
      package_manager:
        description: 'Package Manager'
        required: true
        type: choice
        options:
          - npm
          - yarn
          - pnpm
        default: 'npm'
      package_name:
        description: 'Package Name'
        required: true
        type: string
      verbose:
        description: 'Verbose'
        required: false
        type: boolean
        default: false

jobs:
  impact:
    name: Create Report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Install target package
        run: |
          mkdir impact-report
          cd impact-report
          npm init -y
          case "${{ github.event.inputs.package_manager }}" in
            yarn)
              npm install -g yarn
              yarn add ${{ github.event.inputs.package_name }}
              ;;
            pnpm)
              npm install -g pnpm
              pnpm add ${{ github.event.inputs.package_name }}
              ;;
            *)
              npm install ${{ github.event.inputs.package_name }}
              ;;
          esac

      - name: Run depsweep
        working-directory: impact-report
        run: |
          node ../dist/index.js \
            --json \
            --measure-impact \
            --dry-run \
            --output ../report.json \
            ${{ github.event.inputs.verbose && '--verbose' || '' }} \
            2>../error.log || {
              echo "::error::DepSweep scan failed"
              cat ../error.log
              exit 1
            }

      - name: Generate report
        run: |
          node scripts/generate-report.js report.json > report.md
          cat report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload report
        uses: actions/upload-artifact@v7
        with:
          name: depsweep-impact-${{ github.event.inputs.package_name }}
          path: report.json
          retention-days: 90
