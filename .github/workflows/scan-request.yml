name: Scan Request

on:
  issues:
    types: [opened]

jobs:
  scan:
    name: Scan Project
    if: startsWith(github.event.issue.title, 'depsweep:')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      issues: write
      contents: read

    steps:
      - name: Parse issue title
        id: parse
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          TITLE="$ISSUE_TITLE"
          # Extract owner/repo from "depsweep: owner/repo" or "depsweep:owner/repo"
          REPO=$(echo "$TITLE" | sed 's/^depsweep:\s*//' | tr -d '\n\r')
          OWNER=$(echo "$REPO" | cut -d'/' -f1)
          NAME=$(echo "$REPO" | cut -d'/' -f2)

          if [ -z "$OWNER" ] || [ -z "$NAME" ]; then
            echo "error=Invalid format. Use: depsweep: owner/repo" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Strict validation: owner/repo must be alphanumeric with .-_
          if ! echo "$REPO" | grep -qE '^[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+$'; then
            echo "error=Invalid repository format. Only alphanumeric characters, dots, hyphens, and underscores are allowed." >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Validate target repo exists
        id: validate
        if: steps.parse.outputs.repo
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
          TARGET_REPO: ${{ steps.parse.outputs.repo }}
        run: |
          if ! gh api "repos/$TARGET_REPO" --silent 2>/dev/null; then
            echo "error=Repository $TARGET_REPO not found or not accessible" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "valid=true" >> $GITHUB_OUTPUT

      - name: Handle invalid input
        if: steps.parse.outputs.error || (steps.validate.outcome == 'success' && steps.validate.outputs.error)
        env:
          GH_TOKEN: ${{ github.token }}
          PARSE_ERROR: ${{ steps.parse.outputs.error }}
          VALIDATE_ERROR: ${{ steps.validate.outputs.error }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          ERROR="${PARSE_ERROR}${VALIDATE_ERROR}"
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "**Scan failed:** $ERROR

          Please use the format: \`depsweep: owner/repo\`

          Example: \`depsweep: expressjs/express\`"

          gh label create "depsweep-error" --color "D73A4A" --description "DepSweep scan error" --repo "$REPO" --force 2>/dev/null || true
          gh issue edit "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --add-label "depsweep-error" 2>/dev/null || true

      - name: Add scanning label
        if: steps.validate.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          gh label create "depsweep-scan" --color "0E8A16" --description "DepSweep scan in progress" --repo "$REPO" --force 2>/dev/null || true
          gh issue edit "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --add-label "depsweep-scan"

      - name: Post scanning comment
        if: steps.validate.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          TARGET_REPO: ${{ steps.parse.outputs.repo }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "**Scanning** \`$TARGET_REPO\`...

          This may take a few minutes depending on the project size."

      - name: Checkout depsweep
        if: steps.validate.outputs.valid == 'true'
        uses: actions/checkout@v6

      - name: Setup Node.js
        if: steps.validate.outputs.valid == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install depsweep
        if: steps.validate.outputs.valid == 'true'
        run: |
          npm ci --ignore-scripts
          npm run build

      - name: Setup pnpm
        if: steps.validate.outputs.valid == 'true'
        run: npm install -g pnpm

      - name: Run depsweep scan
        if: steps.validate.outputs.valid == 'true'
        id: scan
        env:
          TARGET_REPO: ${{ steps.parse.outputs.repo }}
        run: |
          node dist/index.js "$TARGET_REPO" --json --measure-impact --output report.json 2>scan-errors.log || true

          if [ ! -f report.json ]; then
            echo "error=Scan failed to produce results" >> $GITHUB_OUTPUT
            if [ -f scan-errors.log ]; then
              echo "details<<EOF" >> $GITHUB_OUTPUT
              head -50 scan-errors.log >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            fi
          else
            echo "success=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate markdown report
        if: steps.scan.outputs.success == 'true'
        run: |
          node scripts/generate-report.js report.json > report.md

      - name: Post scan results
        if: steps.scan.outputs.success == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          TARGET_REPO: ${{ steps.parse.outputs.repo }}
        run: |
          # Post report as issue comment
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body-file report.md

          # Add to job summary
          cat report.md >> $GITHUB_STEP_SUMMARY

          # Check if there are unused deps for the PR workflow link
          UNUSED_COUNT=$(node -e "const r=JSON.parse(require('fs').readFileSync('report.json','utf8')); console.log(r.unusedDependencies.length)")
          if [ "$UNUSED_COUNT" -gt "0" ]; then
            DEPS=$(node -e "const r=JSON.parse(require('fs').readFileSync('report.json','utf8')); console.log(r.unusedDependencies.join(','))")

            gh issue comment "$ISSUE_NUMBER" \
              --repo "$REPO" \
              --body "---

          **Want to submit a PR to remove these dependencies?**

          A repository maintainer can trigger the [Submit PR workflow](https://github.com/$REPO/actions/workflows/submit-pr.yml) with:
          - **repo:** \`$TARGET_REPO\`
          - **dependencies:** \`$DEPS\`"
          fi

      - name: Upload report artifact
        if: steps.scan.outputs.success == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: depsweep-report-${{ steps.parse.outputs.owner }}-${{ steps.parse.outputs.name }}
          path: report.json
          retention-days: 90

      - name: Handle scan failure
        if: steps.scan.outputs.error
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          SCAN_ERROR: ${{ steps.scan.outputs.error }}
          SCAN_DETAILS: ${{ steps.scan.outputs.details }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "**Scan failed:** $SCAN_ERROR

          <details>
          <summary>Error details</summary>

          \`\`\`
          $SCAN_DETAILS
          \`\`\`

          </details>

          Please check that the repository has a valid \`package.json\` and try again."

          gh label create "depsweep-error" --color "D73A4A" --description "DepSweep scan error" --repo "$REPO" --force 2>/dev/null || true
          gh issue edit "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --add-label "depsweep-error" 2>/dev/null || true

      - name: Close issue
        if: steps.scan.outputs.success == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "**Scan complete!** The report has been posted above and is available as a [downloadable artifact](https://github.com/$REPO/actions/runs/$RUN_ID)."
          gh issue close "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --reason completed
